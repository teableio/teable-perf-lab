name: teable perf regression

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: Teable target URL
        required: true
        type: string
      target_kind:
        description: Target kind
        required: true
        default: preview
        type: choice
        options:
          - preview
          - staging
          - release
      case_filter:
        description: Case id, tag, or glob
        required: false
        default: smoke
        type: string
      samples:
        description: Number of measured samples per case
        required: false
        default: '3'
        type: string
      keep_environment_on_failure:
        description: Keep BYODB and space after failure
        required: false
        default: false
        type: boolean

  schedule:
    # Daily at 18:00 UTC / 02:00 Asia-Shanghai.
    - cron: '0 18 * * *'

  repository_dispatch:
    types:
      - teable-release-candidate

permissions:
  contents: read
  actions: read

concurrency:
  group: perf-regression-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  perf-regression:
    name: Run performance regression suite
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      PERF_LAB_HISTORY_DATABASE_URL: ${{ secrets.PERF_LAB_HISTORY_DATABASE_URL }}
      PERF_LAB_ARTIFACT_BUCKET: ${{ secrets.PERF_LAB_ARTIFACT_BUCKET }}
      PERF_LAB_ARTIFACT_ACCESS_KEY_ID: ${{ secrets.PERF_LAB_ARTIFACT_ACCESS_KEY_ID }}
      PERF_LAB_ARTIFACT_SECRET_ACCESS_KEY: ${{ secrets.PERF_LAB_ARTIFACT_SECRET_ACCESS_KEY }}
      TEABLE_API_TOKEN: ${{ secrets.TEABLE_API_TOKEN }}
      BYODB_ADMIN_DATABASE_URL: ${{ secrets.BYODB_ADMIN_DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.18.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve run config
        id: config
        run: |
          echo "target_url=${{ inputs.target_url || vars.DAILY_PERF_TARGET_URL }}" >> "$GITHUB_OUTPUT"
          echo "target_kind=${{ inputs.target_kind || 'staging' }}" >> "$GITHUB_OUTPUT"
          echo "case_filter=${{ inputs.case_filter || 'daily' }}" >> "$GITHUB_OUTPUT"
          echo "samples=${{ inputs.samples || '3' }}" >> "$GITHUB_OUTPUT"

      - name: Run perf lab
        run: |
          pnpm perf-lab run \
            --target-url "${{ steps.config.outputs.target_url }}" \
            --target-kind "${{ steps.config.outputs.target_kind }}" \
            --case-filter "${{ steps.config.outputs.case_filter }}" \
            --samples "${{ steps.config.outputs.samples }}" \
            --persist-history \
            --persist-traces

      - name: Publish job summary
        if: always()
        run: |
          if [ -f artifacts/latest/summary.md ]; then
            cat artifacts/latest/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No perf summary was generated." >> "$GITHUB_STEP_SUMMARY"
          fi

