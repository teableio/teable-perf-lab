name: Teable EE e2e perf

on:
  workflow_dispatch:
    inputs:
      teable_ee_ref:
        description: Branch, tag, or commit SHA in teableio/teable-ee
        required: false
        default: develop
        type: string
      case_filter:
        description: Perf case to inject into teable-ee e2e
        required: false
        default: smoke/auth-user
        type: string
      samples:
        description: Measured samples for the case
        required: false
        default: "10"
        type: string
      perf_threshold_p95_ms:
        description: p95 threshold for the smoke case
        required: false
        default: "2000"
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: teable-ee-e2e-perf-${{ github.ref }}-${{ inputs.case_filter }}
  cancel-in-progress: false

jobs:
  teable-ee-e2e-perf:
    name: Run ${{ inputs.case_filter }} on teable-ee e2e
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      CI_JOB_ID: ${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout perf lab
        uses: actions/checkout@v4
        with:
          path: perf-lab

      - name: Checkout teable-ee
        uses: actions/checkout@v4
        with:
          repository: teableio/teable-ee
          ref: ${{ inputs.teable_ee_ref }}
          path: teable-ee
          ssh-key: ${{ secrets.TEABLE_EE_CHECKOUT_SSH_KEY }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.18.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.13.0

      - name: Install teable-ee dependencies
        working-directory: teable-ee
        run: pnpm install --frozen-lockfile

      - name: Inject smoke case
        run: |
          mkdir -p teable-ee/community/apps/nestjs-backend/test/perf-lab
          cp perf-lab/cases/smoke/auth-user.e2e-spec.ts \
            teable-ee/community/apps/nestjs-backend/test/perf-lab/auth-user.e2e-spec.ts

      - name: Run perf case through teable-ee e2e
        working-directory: teable-ee
        run: |
          # See .github/workflows/teable-ee-e2e-perf.yml for the full runnable
          # workflow, including Postgres/Redis startup and cleanup.
          pnpm -F @teable/backend-ee exec vitest run \
            --config ./vitest-e2e-community.config.ts \
            ../../community/apps/nestjs-backend/test/perf-lab/auth-user.e2e-spec.ts \
            --silent=false \
            --bail 1

      - name: Publish job summary
        if: always()
        run: |
          if [ -f perf-lab-artifacts/summary.md ]; then
            cat perf-lab-artifacts/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No perf summary was generated." >> "$GITHUB_STEP_SUMMARY"
          fi
