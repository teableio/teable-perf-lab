name: Teable EE e2e perf

on:
  workflow_dispatch:
    inputs:
      teable_ee_ref:
        description: Branch, tag, or commit SHA in teableio/teable-ee
        required: false
        default: develop
        type: string
      case_filter:
        description: Perf case id, comma-separated case ids, or all
        required: false
        default: smoke/auth-user
        type: string
      samples:
        description: Measured samples for the case
        required: false
        default: "10"
        type: string
      primary_threshold_ms:
        description: Optional primary threshold override in milliseconds
        required: false
        default: ""
        type: string
      engine_filter:
        description: Engine list to run, comma-separated from v1,v2
        required: false
        default: v1,v2
        type: string
      computed_update_mode:
        description: >-
          Optional V2 computed update mode for execute jobs (sync | hybrid).
          Leave empty to keep the e2e default (sync). Use hybrid to exercise the
          production outbox + polling-worker path; only run async-tolerant cases
          with it.
        required: false
        default: ""
        type: string

permissions:
  contents: read
  actions: write

concurrency:
  # A comma-separated case list can exceed GitHub's 256-character concurrency
  # key limit before any job starts. Keep single-case keys descriptive and
  # collapse multi-case runs to one bounded key per ref.
  group: teable-ee-e2e-perf-${{ github.ref }}-${{ contains(inputs.case_filter, ',') && 'multi-case' || inputs.case_filter }}
  cancel-in-progress: false

env:
  NODE_ENV: test
  PRISMA_DATABASE_URL: "postgresql://teable:teable@127.0.0.1:25432/e2e_test_teable?schema=public&statement_cache_size=0&connection_limit=20"
  PRISMA_META_DATABASE_URL: "postgresql://teable:teable@127.0.0.1:25432/e2e_test_teable?schema=public&statement_cache_size=0&connection_limit=20"
  PRISMA_TRANSACTION_TIMEOUT: "30000"
  BACKEND_CACHE_PROVIDER: redis
  BACKEND_CACHE_REDIS_URI: "redis://default:teable@127.0.0.1:6379/1"
  BACKEND_PERFORMANCE_CACHE: "redis://default:teable@127.0.0.1:6379/1"
  TEABLE_SSRF_PROTECTION_DISABLED: "true"
  PERF_LAB_TRACE_ENABLED: "true"
  PERF_LAB_JAEGER_API_BASE_URL: "http://136.119.178.56:16686"
  PERF_LAB_TRACE_MAX_SNAPSHOTS: "100"
  PERF_LAB_TRACE_FETCH_SETTLE_MS: "5000"
  # Traces that exist in Jaeger return within ~1s of the 5s settle. A trace
  # still missing after this timeout will not appear later: it was dropped
  # upstream before reaching Jaeger (root cause is engine-side and tracked
  # separately). Polling longer only burns wall-clock. The collector selects
  # one representative per semantic request shape, opens a partial-loss
  # breaker after three misses, and allows one bounded recovery probe.
  PERF_LAB_TRACE_FETCH_TIMEOUT_MS: "3000"
  PERF_LAB_TRACE_FETCH_POLL_INTERVAL_MS: "500"
  PERF_LAB_TRACE_FETCH_CONCURRENCY: "8"
  PERF_LAB_TRACE_PARTIAL_LOSS_THRESHOLD: "3"
  PERF_LAB_TRACE_RECOVERY_PROBE_LIMIT: "1"
  PERF_LAB_TRACE_CASE_BUDGET_MS: "15000"
  PERF_LAB_TRACE_JOB_BUDGET_MS: "60000"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://136.119.178.56:4318/v1/traces"
  OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: ""
  OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: ""
  TRACE_LINK_BASE_URL: "http://136.119.178.56:16686"
  OTEL_EXPORT_RATIO: "1"
  TEABLE_PERF_LAB_BASE_ID: bselS3I2MeVI6RJhS4g
  TEABLE_PERF_LAB_TABLE_ID: tblwPqrcchUzvyEOqLo
  TEABLE_PERF_LAB_TOKEN: ${{ secrets.TEABLE_PERF_LAB_TOKEN }}
  PERF_LAB_SEED_CACHE_ENABLED: "true"
  PERF_LAB_SEED_CACHE_DIR: ${{ github.workspace }}/perf-lab-seed-cache
  PERF_LAB_SEED_DB_DUMP: ${{ github.workspace }}/perf-lab-seed-cache/e2e_test_teable.dump

jobs:
  resolve_inputs:
    name: Resolve workflow inputs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      engines: ${{ steps.engines.outputs.engines }}
      seed_plan: ${{ steps.engines.outputs.seed_plan }}
      execute_plan: ${{ steps.engines.outputs.execute_plan }}
      case_filter_key: ${{ steps.engines.outputs.case_filter_key }}

    steps:
      - name: Checkout perf lab
        uses: actions/checkout@v5
        with:
          path: perf-lab

      - name: Resolve engine matrix
        id: engines
        env:
          ENGINE_FILTER: ${{ inputs.engine_filter }}
          CASE_FILTER: ${{ inputs.case_filter }}
          COMPUTED_UPDATE_MODE: ${{ inputs.computed_update_mode }}
        run: |
          set -euo pipefail

          node perf-lab/scripts/run-plan.mjs

  seed:
    name: Prepare perf seed DB (${{ matrix.plan.name }})
    needs: resolve_inputs
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        plan: ${{ fromJSON(needs.resolve_inputs.outputs.seed_plan) }}

    env:
      CI_JOB_ID: ${{ github.run_id }}-${{ github.run_attempt }}-seed-${{ matrix.plan.name }}
      NETWORK_MODE: teablenet-${{ github.run_id }}-${{ github.run_attempt }}-seed-${{ matrix.plan.name }}
      TEST_PG_CONTAINER_NAME: teable-postgres-${{ github.run_id }}-${{ github.run_attempt }}-seed-${{ matrix.plan.name }}

    steps:
      - name: Checkout perf lab
        uses: actions/checkout@v5
        with:
          path: perf-lab

      - name: Checkout teable-ee
        uses: actions/checkout@v5
        with:
          repository: teableio/teable-ee
          ref: ${{ inputs.teable_ee_ref }}
          path: teable-ee
          ssh-key: ${{ secrets.TEABLE_EE_CHECKOUT_SSH_KEY }}

      - name: Restore perf seed database cache
        id: seed-db-cache
        uses: actions/cache/restore@v5
        with:
          path: perf-lab-seed-cache
          key: perf-seed-db-${{ runner.os }}-${{ matrix.plan.caseFilterKey }}-${{ hashFiles('teable-ee/packages/db-main-prisma/prisma/postgres/schema.prisma', 'teable-ee/packages/db-main-prisma/prisma/postgres/migrations/**', 'teable-ee/community/packages/db-data-prisma/prisma/schema.prisma', 'teable-ee/community/packages/db-data-prisma/prisma/migrations/**') }}-${{ hashFiles('perf-lab/cases/**/*.case.ts', 'perf-lab/framework/**/*.ts', 'perf-lab/perf-lab.e2e-spec.ts', 'perf-lab/registry.ts') }}
          restore-keys: |
            perf-seed-db-${{ runner.os }}-${{ matrix.plan.caseFilterKey }}-${{ hashFiles('teable-ee/packages/db-main-prisma/prisma/postgres/schema.prisma', 'teable-ee/packages/db-main-prisma/prisma/postgres/migrations/**', 'teable-ee/community/packages/db-data-prisma/prisma/schema.prisma', 'teable-ee/community/packages/db-data-prisma/prisma/migrations/**') }}-

      - name: Publish seed database cache hit summary
        if: steps.seed-db-cache.outputs.cache-hit == 'true'
        run: |
          set -euo pipefail

          test -s "$PERF_LAB_SEED_DB_DUMP"
          {
            echo "## Perf seed DB cache"
            echo
            echo "Exact perf seed DB cache hit. Seed app setup and seed validation were skipped."
            echo
            ls -lh "$PERF_LAB_SEED_DB_DUMP"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup pnpm
        if: steps.seed-db-cache.outputs.cache-hit != 'true'
        uses: pnpm/action-setup@v5
        with:
          version: 9.13.0

      - name: Setup Node.js
        if: steps.seed-db-cache.outputs.cache-hit != 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 22.18.0
          cache: pnpm
          cache-dependency-path: teable-ee/pnpm-lock.yaml

      - name: Install teable-ee dependencies
        if: steps.seed-db-cache.outputs.cache-hit != 'true'
        working-directory: teable-ee
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma clients
        if: steps.seed-db-cache.outputs.cache-hit != 'true'
        working-directory: teable-ee
        run: |
          set -euo pipefail

          pnpm -F @teable/db-main-prisma-ee prisma-generate-ci
          pnpm -F @teable/db-data-prisma prisma-generate-ci

      - name: Install perf cases
        if: steps.seed-db-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail

          rm -rf teable-ee/community/apps/nestjs-backend/test/perf-lab
          mkdir -p teable-ee/community/apps/nestjs-backend/test/perf-lab
          cp -R \
            perf-lab/cases \
            perf-lab/framework \
            perf-lab/perf-lab.e2e-spec.ts \
            perf-lab/registry.ts \
            teable-ee/community/apps/nestjs-backend/test/perf-lab/
          cp perf-lab/vitest-perf-lab.config.ts teable-ee/enterprise/backend-ee/vitest-perf-lab.config.ts

      - name: Start e2e services
        if: steps.seed-db-cache.outputs.cache-hit != 'true'
        working-directory: teable-ee
        run: |
          set -euo pipefail

          export DOCKER_UID="$(id -u)"
          export DOCKER_GID="$(getent group docker | cut -d: -f3)"

          make docker.create.network
          docker rm -fv "$TEST_PG_CONTAINER_NAME" || true
          docker rm -fv teable-cache || true

          docker compose \
            --env-file ./dockers/.env \
            -f ./dockers/networks.yml \
            -f ./dockers/database-postgres.yml \
            -f ./dockers/cache-redis.yml \
            run -p 25432:5432 -d -T --no-deps --rm \
            --name "$TEST_PG_CONTAINER_NAME" teable-postgres

          docker compose \
            --env-file ./dockers/.env \
            -f ./dockers/networks.yml \
            -f ./dockers/cache-redis.yml \
            up --no-recreate -d teable-cache

          chmod +x scripts/wait-for
          scripts/wait-for 127.0.0.1:25432 --timeout=60 -- echo 'pg database started successfully'
          scripts/wait-for 127.0.0.1:6379 --timeout=60 -- echo 'redis cache started successfully'
          until docker exec "$TEST_PG_CONTAINER_NAME" pg_isready -U teable -d postgres; do
            sleep 1
          done

      - name: Prepare e2e database
        if: steps.seed-db-cache.outputs.cache-hit != 'true'
        working-directory: teable-ee
        run: |
          set -euo pipefail

          if [ -s "$PERF_LAB_SEED_DB_DUMP" ]; then
            echo "Restoring cached perf seed DB from ${PERF_LAB_SEED_DB_DUMP}"
            set +e
            (
              set -e
              docker exec "$TEST_PG_CONTAINER_NAME" dropdb -U teable --if-exists e2e_test_teable
              docker exec "$TEST_PG_CONTAINER_NAME" createdb -U teable e2e_test_teable
              docker exec -i "$TEST_PG_CONTAINER_NAME" pg_restore \
                -U teable \
                -d e2e_test_teable \
                --clean \
                --if-exists \
                < "$PERF_LAB_SEED_DB_DUMP"
            )
            restore_status=$?
            set -e

            if [ "$restore_status" -eq 0 ]; then
              echo "Cached perf seed DB restored successfully."
              exit 0
            fi

            echo "::warning::Cached perf seed DB restore failed; rebuilding from migrations."
          fi

          docker exec "$TEST_PG_CONTAINER_NAME" dropdb -U teable --if-exists e2e_test_teable
          docker exec "$TEST_PG_CONTAINER_NAME" createdb -U teable e2e_test_teable
          make postgres.mode
          pnpm -F @teable/db-main-prisma-ee prisma-db-seed -- --e2e

      - name: Build perf seed DB
        if: steps.seed-db-cache.outputs.cache-hit != 'true'
        working-directory: teable-ee
        run: |
          set -euo pipefail

          export PERF_LAB_ARTIFACT_DIR="${GITHUB_WORKSPACE}/perf-lab-seed-artifacts"
          export PERF_LAB_RUN_ID="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          export PERF_LAB_MODE="seed"
          export PERF_LAB_CASE_FILTER="${{ matrix.plan.caseFilter }}"
          export PERF_LAB_ENGINE_LIST="v1"
          export PERF_LAB_SAMPLES="${{ inputs.samples }}"
          export PERF_LAB_PRIMARY_THRESHOLD_MS="${{ inputs.primary_threshold_ms }}"
          export PERF_LAB_OTEL_SERVICE_PREFIX="teable-perf-seed-${{ matrix.plan.artifactSuffix }}"
          export PERF_LAB_SEED_SCHEMA_SIGNATURE="${{ hashFiles('teable-ee/packages/db-main-prisma/prisma/postgres/schema.prisma', 'teable-ee/packages/db-main-prisma/prisma/postgres/migrations/**', 'teable-ee/community/packages/db-data-prisma/prisma/schema.prisma', 'teable-ee/community/packages/db-data-prisma/prisma/migrations/**') }}"

          pnpm -F @teable/backend-ee exec vitest run \
            --config ./vitest-perf-lab.config.ts \
            ../../community/apps/nestjs-backend/test/perf-lab/perf-lab.e2e-spec.ts \
            --silent=false

      - name: Dump perf seed database
        if: success() && steps.seed-db-cache.outputs.cache-hit != 'true'
        working-directory: teable-ee
        run: |
          set -euo pipefail

          mkdir -p "$PERF_LAB_SEED_CACHE_DIR"
          docker exec "$TEST_PG_CONTAINER_NAME" pg_dump \
            -U teable \
            -Fc \
            e2e_test_teable \
            > "$PERF_LAB_SEED_DB_DUMP"
          ls -lh "$PERF_LAB_SEED_DB_DUMP"

      - name: Save perf seed database cache
        if: success() && steps.seed-db-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: perf-lab-seed-cache
          key: perf-seed-db-${{ runner.os }}-${{ matrix.plan.caseFilterKey }}-${{ hashFiles('teable-ee/packages/db-main-prisma/prisma/postgres/schema.prisma', 'teable-ee/packages/db-main-prisma/prisma/postgres/migrations/**', 'teable-ee/community/packages/db-data-prisma/prisma/schema.prisma', 'teable-ee/community/packages/db-data-prisma/prisma/migrations/**') }}-${{ hashFiles('perf-lab/cases/**/*.case.ts', 'perf-lab/framework/**/*.ts', 'perf-lab/perf-lab.e2e-spec.ts', 'perf-lab/registry.ts') }}

      - name: Upload perf seed database dump
        if: success()
        uses: actions/upload-artifact@v6
        with:
          # Keep the name stable across attempts (no run_attempt) so a partial
          # "Re-run failed jobs" of the execute matrix can still resolve the seed
          # dump even when the already-passed seed job does not re-run. overwrite
          # lets a full re-run (seed re-runs too) replace the stale dump.
          name: teable-ee-e2e-perf-seed-db-${{ matrix.plan.artifactSuffix }}-${{ github.run_id }}
          path: perf-lab-seed-cache/e2e_test_teable.dump
          if-no-files-found: error
          overwrite: true

      - name: Upload perf seed artifacts
        if: always() && steps.seed-db-cache.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v6
        with:
          name: teable-ee-e2e-perf-seed-${{ matrix.plan.artifactSuffix }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: perf-lab-seed-artifacts
          if-no-files-found: warn

      - name: Publish seed summary
        if: always()
        run: |
          shopt -s nullglob
          summaries=(perf-lab-seed-artifacts/summary-*.md)
          if [ "${#summaries[@]}" -gt 0 ]; then
            for summary in "${summaries[@]}"; do
              cat "$summary" >> "$GITHUB_STEP_SUMMARY"
              printf '\n---\n' >> "$GITHUB_STEP_SUMMARY"
            done
          else
            echo "No perf seed summary was generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Cleanup teable-ee e2e services
        if: always() && steps.seed-db-cache.outputs.cache-hit != 'true'
        working-directory: teable-ee
        run: |
          set +e

          export DOCKER_UID="$(id -u)"
          export DOCKER_GID="$(getent group docker | cut -d: -f3)"

          docker rm -fv "$TEST_PG_CONTAINER_NAME" || true
          docker rm -fv teable-cache || true
          docker compose \
            --env-file ./dockers/.env \
            -f ./dockers/networks.yml \
            -f ./dockers/database-postgres.yml \
            -f ./dockers/cache-redis.yml \
            down -v || true
          docker network rm "$NETWORK_MODE" || true

  execute:
    name: Run perf cases (${{ matrix.plan.name }})
    needs:
      - resolve_inputs
      - seed
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        plan: ${{ fromJSON(needs.resolve_inputs.outputs.execute_plan) }}

    env:
      CI_JOB_ID: ${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.plan.name }}
      NETWORK_MODE: teablenet-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.plan.name }}
      TEST_PG_CONTAINER_NAME: teable-postgres-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.plan.name }}

    steps:
      - name: Checkout perf lab
        uses: actions/checkout@v5
        with:
          path: perf-lab

      - name: Checkout teable-ee
        uses: actions/checkout@v5
        with:
          repository: teableio/teable-ee
          ref: ${{ inputs.teable_ee_ref }}
          path: teable-ee
          ssh-key: ${{ secrets.TEABLE_EE_CHECKOUT_SSH_KEY }}

      - name: Download perf seed database dump
        uses: actions/download-artifact@v7
        with:
          name: teable-ee-e2e-perf-seed-db-${{ matrix.plan.seedArtifactSuffix }}-${{ github.run_id }}
          path: perf-lab-seed-cache

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.13.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.18.0
          cache: pnpm
          cache-dependency-path: teable-ee/pnpm-lock.yaml

      - name: Install teable-ee dependencies
        working-directory: teable-ee
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma clients
        working-directory: teable-ee
        run: |
          set -euo pipefail

          pnpm -F @teable/db-main-prisma-ee prisma-generate-ci
          pnpm -F @teable/db-data-prisma prisma-generate-ci

      - name: Install perf cases
        run: |
          set -euo pipefail

          rm -rf teable-ee/community/apps/nestjs-backend/test/perf-lab
          mkdir -p teable-ee/community/apps/nestjs-backend/test/perf-lab
          cp -R \
            perf-lab/cases \
            perf-lab/framework \
            perf-lab/perf-lab.e2e-spec.ts \
            perf-lab/registry.ts \
            teable-ee/community/apps/nestjs-backend/test/perf-lab/
          cp perf-lab/vitest-perf-lab.config.ts teable-ee/enterprise/backend-ee/vitest-perf-lab.config.ts

      - name: Start e2e services
        working-directory: teable-ee
        run: |
          set -euo pipefail

          export DOCKER_UID="$(id -u)"
          export DOCKER_GID="$(getent group docker | cut -d: -f3)"

          make docker.create.network
          docker rm -fv "$TEST_PG_CONTAINER_NAME" || true
          docker rm -fv teable-cache || true

          docker compose \
            --env-file ./dockers/.env \
            -f ./dockers/networks.yml \
            -f ./dockers/database-postgres.yml \
            -f ./dockers/cache-redis.yml \
            run -p 25432:5432 -d -T --no-deps --rm \
            --name "$TEST_PG_CONTAINER_NAME" teable-postgres

          docker compose \
            --env-file ./dockers/.env \
            -f ./dockers/networks.yml \
            -f ./dockers/cache-redis.yml \
            up --no-recreate -d teable-cache

          chmod +x scripts/wait-for
          scripts/wait-for 127.0.0.1:25432 --timeout=60 -- echo 'pg database started successfully'
          scripts/wait-for 127.0.0.1:6379 --timeout=60 -- echo 'redis cache started successfully'
          until docker exec "$TEST_PG_CONTAINER_NAME" pg_isready -U teable -d postgres; do
            sleep 1
          done

      - name: Restore perf seed database
        working-directory: teable-ee
        run: |
          set -euo pipefail

          test -s "$PERF_LAB_SEED_DB_DUMP"
          docker exec "$TEST_PG_CONTAINER_NAME" dropdb -U teable --if-exists e2e_test_teable
          docker exec "$TEST_PG_CONTAINER_NAME" createdb -U teable e2e_test_teable
          docker exec -i "$TEST_PG_CONTAINER_NAME" pg_restore \
            -U teable \
            -d e2e_test_teable \
            --clean \
            --if-exists \
            < "$PERF_LAB_SEED_DB_DUMP"

      - name: Run perf cases through teable-ee e2e
        working-directory: teable-ee
        run: |
          set -euo pipefail

          export PERF_LAB_ARTIFACT_DIR="${GITHUB_WORKSPACE}/perf-lab-artifacts/${{ matrix.plan.artifactSuffix }}"
          export PERF_LAB_RUN_ID="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          export PERF_LAB_MODE="execute"
          export PERF_LAB_CASE_FILTER="${{ matrix.plan.caseFilter }}"
          export PERF_LAB_EXCLUDE_CASE_FILTER="${{ matrix.plan.excludeCaseFilter }}"
          export PERF_LAB_ENGINE_LIST="${{ matrix.plan.engine }}"
          export PERF_LAB_SAMPLES="${{ inputs.samples }}"
          export PERF_LAB_PRIMARY_THRESHOLD_MS="${{ inputs.primary_threshold_ms }}"
          export PERF_LAB_COMPUTED_UPDATE_MODE="${{ matrix.plan.computedUpdateMode }}"
          export PERF_LAB_EXECUTE_DB_ISOLATED="true"
          export PERF_LAB_OTEL_SERVICE_PREFIX="teable-perf-${{ matrix.plan.otelServiceSuffix }}"
          export PERF_LAB_SEED_SCHEMA_SIGNATURE="${{ hashFiles('teable-ee/packages/db-main-prisma/prisma/postgres/schema.prisma', 'teable-ee/packages/db-main-prisma/prisma/postgres/migrations/**', 'teable-ee/community/packages/db-data-prisma/prisma/schema.prisma', 'teable-ee/community/packages/db-data-prisma/prisma/migrations/**') }}"
          export PERF_LAB_TRACE_MAX_SNAPSHOTS="500"
          export PERF_LAB_TRACE_BACKGROUND_FLUSH_MS="1000"

          pnpm -F @teable/backend-ee exec vitest run \
            --config ./vitest-perf-lab.config.ts \
            ../../community/apps/nestjs-backend/test/perf-lab/perf-lab.e2e-spec.ts \
            --silent=false

      - name: Upload perf artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: teable-ee-e2e-perf-${{ matrix.plan.artifactSuffix }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: perf-lab-artifacts/${{ matrix.plan.artifactSuffix }}
          if-no-files-found: warn

      - name: Stage lightweight perf results
        if: always()
        run: |
          set -euo pipefail

          src="perf-lab-artifacts/${{ matrix.plan.artifactSuffix }}"
          dest="perf-lab-results/${{ matrix.plan.artifactSuffix }}"

          if [ ! -d "$src" ]; then
            echo "No perf artifacts at $src; skipping lightweight staging."
            exit 0
          fi

          mkdir -p "$dest"

          # Top-level perf payload JSON files; raw trace snapshots live under traces/.
          find "$src" -maxdepth 1 -type f -name '*.json' -exec cp {} "$dest/" \;

          # Per-result summary markdown.
          find "$src" -maxdepth 1 -type f -name 'summary-*.md' -exec cp {} "$dest/" \;

          # Trace manifests only; skip the heavy raw Jaeger snapshot JSON files.
          while IFS= read -r -d '' manifest; do
            rel="${manifest#"$src/"}"
            mkdir -p "$dest/$(dirname "$rel")"
            cp "$manifest" "$dest/$rel"
          done < <(find "$src" -type f -name 'manifest.json' -print0)

          echo "Staged lightweight perf results:"
          find "$dest" -type f | sort

      - name: Upload lightweight perf results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: teable-ee-e2e-perf-results-${{ matrix.plan.artifactSuffix }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: perf-lab-results/${{ matrix.plan.artifactSuffix }}
          if-no-files-found: warn

      - name: Publish job summary
        if: always()
        run: |
          shopt -s nullglob
          summaries=(perf-lab-artifacts/${{ matrix.plan.artifactSuffix }}/summary-*.md)
          if [ "${#summaries[@]}" -gt 0 ]; then
            for summary in "${summaries[@]}"; do
              cat "$summary" >> "$GITHUB_STEP_SUMMARY"
              printf '\n---\n' >> "$GITHUB_STEP_SUMMARY"
            done
          else
            echo "No perf summary was generated for ${{ matrix.plan.name }}." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Cleanup teable-ee e2e services
        if: always()
        working-directory: teable-ee
        run: |
          set +e

          export DOCKER_UID="$(id -u)"
          export DOCKER_GID="$(getent group docker | cut -d: -f3)"

          docker rm -fv "$TEST_PG_CONTAINER_NAME" || true
          docker rm -fv teable-cache || true
          docker compose \
            --env-file ./dockers/.env \
            -f ./dockers/networks.yml \
            -f ./dockers/database-postgres.yml \
            -f ./dockers/cache-redis.yml \
            down -v || true
          docker network rm "$NETWORK_MODE" || true

  report:
    name: Report perf results
    needs: execute
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout perf lab
        uses: actions/checkout@v5
        with:
          path: perf-lab

      - name: Resolve perf artifact attempt
        id: perf_artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Prefer the lightweight results artifacts (payload JSON, summaries, and
          # trace manifests). Fall back to the full artifacts so report re-runs on
          # older runs, or runs where lightweight staging produced nothing, still
          # resolve. The full artifacts also carry the raw Jaeger trace snapshots.
          selected_attempt=""
          for attempt in $(seq "${GITHUB_RUN_ATTEMPT}" -1 1); do
            for prefix in teable-ee-e2e-perf-results-v teable-ee-e2e-perf-v; do
              pattern="${prefix}*-${GITHUB_RUN_ID}-${attempt}"
              count="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts" \
                --paginate \
                --jq "[.artifacts[] | select(.expired == false and (.name | test(\"^${prefix}[A-Za-z0-9_.-]+-${GITHUB_RUN_ID}-${attempt}$\")))] | length")"

              if [ "${count}" -gt 0 ]; then
                selected_attempt="${attempt}"
                echo "Using ${prefix%-v} artifacts from run attempt ${attempt}."
                echo "pattern=${pattern}" >> "$GITHUB_OUTPUT"
                break
              fi
            done

            if [ -n "${selected_attempt}" ]; then
              break
            fi
          done

          if [ -z "${selected_attempt}" ]; then
            echo "No perf execute artifacts found for run ${GITHUB_RUN_ID}." >&2
            exit 1
          fi

      - name: Download perf artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: ${{ steps.perf_artifacts.outputs.pattern }}
          path: perf-lab-artifacts
          merge-multiple: false

      - name: Report perf results to Teable
        if: env.TEABLE_PERF_LAB_TOKEN != ''
        working-directory: perf-lab
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TEABLE_PERF_LAB_TOKEN: ${{ secrets.TEABLE_PERF_LAB_TOKEN }}
          PERF_LAB_ARTIFACT_DIR: ${{ github.workspace }}/perf-lab-artifacts
          PERF_LAB_JOB_RESULT: ${{ needs.execute.result }}
          PERF_LAB_TEABLE_EE_REF: ${{ inputs.teable_ee_ref }}
        run: node scripts/report-teable-result.mjs

      - name: Send Feishu perf summary
        if: always()
        working-directory: perf-lab
        env:
          GITHUB_TOKEN: ${{ github.token }}
          FEISHU_PERF_WEBHOOK_URL: ${{ secrets.FEISHU_PERF_WEBHOOK_URL }}
          TEABLE_PERF_LAB_TOKEN: ${{ secrets.TEABLE_PERF_LAB_TOKEN }}
          PERF_LAB_ARTIFACT_DIR: ${{ github.workspace }}/perf-lab-artifacts
          PERF_LAB_JOB_RESULT: ${{ needs.execute.result }}
          PERF_LAB_TEABLE_EE_REF: ${{ inputs.teable_ee_ref }}
          PERF_LAB_CHART_URL: https://ppm.teable.app
        run: node scripts/send-feishu-perf-summary.mjs

      - name: Publish combined summary
        if: always()
        working-directory: perf-lab
        env:
          PERF_LAB_ARTIFACT_DIR: ${{ github.workspace }}/perf-lab-artifacts
          PERF_LAB_CHART_URL: https://ppm.teable.app
          PERF_LAB_JOB_RESULT: ${{ needs.execute.result }}
          PERF_LAB_TEABLE_EE_REF: ${{ inputs.teable_ee_ref }}
        run: node scripts/write-github-perf-summary.mjs
