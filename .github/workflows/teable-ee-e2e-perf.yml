name: Teable EE e2e perf

on:
  workflow_dispatch:
    inputs:
      teable_ee_ref:
        description: Branch, tag, or commit SHA in teableio/teable-ee
        required: false
        default: develop
        type: string
      case_filter:
        description: Perf case id, comma-separated case ids, or all
        required: false
        default: smoke/auth-user
        type: string
      samples:
        description: Measured samples for the case
        required: false
        default: "10"
        type: string
      primary_threshold_ms:
        description: Optional primary threshold override in milliseconds
        required: false
        default: ""
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: teable-ee-e2e-perf-${{ github.ref }}-${{ inputs.case_filter }}
  cancel-in-progress: false

env:
  NODE_ENV: test
  PRISMA_DATABASE_URL: "postgresql://teable:teable@127.0.0.1:25432/e2e_test_teable?schema=public&statement_cache_size=0&connection_limit=20"
  PRISMA_META_DATABASE_URL: "postgresql://teable:teable@127.0.0.1:25432/e2e_test_teable?schema=public&statement_cache_size=0&connection_limit=20"
  PRISMA_TRANSACTION_TIMEOUT: "30000"
  BACKEND_CACHE_PROVIDER: redis
  BACKEND_CACHE_REDIS_URI: "redis://default:teable@127.0.0.1:6379/1"
  BACKEND_PERFORMANCE_CACHE: "redis://default:teable@127.0.0.1:6379/1"
  TEABLE_SSRF_PROTECTION_DISABLED: "true"
  PERF_LAB_TRACE_ENABLED: "true"
  PERF_LAB_JAEGER_API_BASE_URL: "http://127.0.0.1:16686"
  PERF_LAB_TRACE_MAX_SNAPSHOTS: "25"
  PERF_LAB_TRACE_FETCH_TIMEOUT_MS: "20000"
  PERF_LAB_TRACE_FETCH_POLL_INTERVAL_MS: "500"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://127.0.0.1:4318/v1/traces"
  OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: ""
  OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: ""
  TRACE_LINK_BASE_URL: "http://127.0.0.1:16686"
  OTEL_EXPORT_RATIO: "1.0"
  TEABLE_PERF_LAB_BASE_ID: bselS3I2MeVI6RJhS4g
  TEABLE_PERF_LAB_TABLE_ID: tblwPqrcchUzvyEOqLo
  TEABLE_PERF_LAB_TOKEN: ${{ secrets.TEABLE_PERF_LAB_TOKEN }}

jobs:
  resolve-case-matrix:
    name: Resolve perf case matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout perf lab
        uses: actions/checkout@v4
        with:
          path: perf-lab

      - name: Resolve case matrix
        id: matrix
        working-directory: perf-lab
        env:
          PERF_LAB_CASE_FILTER: ${{ inputs.case_filter }}
        run: |
          set -euo pipefail

          matrix="$(node scripts/resolve-case-matrix.mjs)"
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"
          echo "${matrix}" >> "$GITHUB_STEP_SUMMARY"

  prepare-e2e-seed:
    name: Prepare teable-ee e2e seed snapshot
    runs-on: ubuntu-latest
    needs: resolve-case-matrix
    timeout-minutes: 45
    env:
      CI_JOB_ID: ${{ github.run_id }}-${{ github.run_attempt }}-seed
      NETWORK_MODE: teablenet-${{ github.run_id }}-${{ github.run_attempt }}-seed
      TEST_PG_CONTAINER_NAME: teable-postgres-${{ github.run_id }}-${{ github.run_attempt }}-seed

    steps:
      - name: Checkout teable-ee
        uses: actions/checkout@v4
        with:
          repository: teableio/teable-ee
          ref: ${{ inputs.teable_ee_ref }}
          path: teable-ee
          ssh-key: ${{ secrets.TEABLE_EE_CHECKOUT_SSH_KEY }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.13.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
          cache: pnpm
          cache-dependency-path: teable-ee/pnpm-lock.yaml

      - name: Install teable-ee dependencies
        working-directory: teable-ee
        run: pnpm install --frozen-lockfile

      - name: Start Postgres
        working-directory: teable-ee
        run: |
          set -euo pipefail

          export DOCKER_UID="$(id -u)"
          export DOCKER_GID="$(getent group docker | cut -d: -f3)"
          export NETWORK_MODE="${NETWORK_MODE}"
          export TEST_PG_CONTAINER_NAME="${TEST_PG_CONTAINER_NAME}"

          make docker.create.network
          docker rm -fv "$TEST_PG_CONTAINER_NAME" || true
          docker compose \
            --env-file ./dockers/.env \
            -f ./dockers/networks.yml \
            -f ./dockers/database-postgres.yml \
            run -p 25432:5432 -d -T --no-deps --rm \
            --name "$TEST_PG_CONTAINER_NAME" teable-postgres

          chmod +x scripts/wait-for
          scripts/wait-for 127.0.0.1:25432 --timeout=60 -- echo 'pg database started successfully'
          until docker exec "$TEST_PG_CONTAINER_NAME" pg_isready -U teable -d postgres; do
            sleep 1
          done
          docker exec "$TEST_PG_CONTAINER_NAME" createdb -U teable e2e_test_teable || true

      - name: Migrate and seed e2e database
        working-directory: teable-ee
        run: |
          set -euo pipefail

          make postgres.mode
          pnpm -F @teable/db-main-prisma-ee prisma-db-seed -- --e2e

      - name: Dump seeded e2e database
        working-directory: teable-ee
        run: |
          set -euo pipefail

          mkdir -p "${GITHUB_WORKSPACE}/seed-snapshot"
          docker exec "$TEST_PG_CONTAINER_NAME" pg_dump -U teable -Fc e2e_test_teable > "${GITHUB_WORKSPACE}/seed-snapshot/e2e_test_teable.dump"

      - name: Upload e2e seed snapshot
        uses: actions/upload-artifact@v4
        with:
          name: teable-ee-e2e-seed-${{ github.run_id }}-${{ github.run_attempt }}
          path: seed-snapshot/e2e_test_teable.dump
          if-no-files-found: error

      - name: Cleanup seed services
        if: always()
        working-directory: teable-ee
        run: |
          set +e

          export DOCKER_UID="$(id -u)"
          export DOCKER_GID="$(getent group docker | cut -d: -f3)"
          export NETWORK_MODE="${NETWORK_MODE}"
          export TEST_PG_CONTAINER_NAME="${TEST_PG_CONTAINER_NAME}"

          docker rm -fv "$TEST_PG_CONTAINER_NAME" || true
          docker compose \
            --env-file ./dockers/.env \
            -f ./dockers/networks.yml \
            -f ./dockers/database-postgres.yml \
            down -v || true
          docker network rm "$NETWORK_MODE" || true

  teable-ee-e2e-perf:
    name: Run ${{ matrix.case_id }} on teable-ee e2e (${{ matrix.engine }})
    runs-on: ubuntu-latest
    needs:
      - resolve-case-matrix
      - prepare-e2e-seed
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve-case-matrix.outputs.matrix) }}

    env:
      CI_JOB_ID: ${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.artifact_case }}-${{ matrix.engine }}
      NETWORK_MODE: teablenet-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.artifact_case }}-${{ matrix.engine }}
      TEST_PG_CONTAINER_NAME: teable-postgres-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.artifact_case }}-${{ matrix.engine }}
      TEST_JAEGER_CONTAINER_NAME: teable-jaeger-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.artifact_case }}-${{ matrix.engine }}
      FORCE_V2_ALL: ${{ matrix.force_v2_all }}

    steps:
      - name: Checkout perf lab
        uses: actions/checkout@v4
        with:
          path: perf-lab

      - name: Checkout teable-ee
        uses: actions/checkout@v4
        with:
          repository: teableio/teable-ee
          ref: ${{ inputs.teable_ee_ref }}
          path: teable-ee
          ssh-key: ${{ secrets.TEABLE_EE_CHECKOUT_SSH_KEY }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.13.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
          cache: pnpm
          cache-dependency-path: teable-ee/pnpm-lock.yaml

      - name: Install teable-ee dependencies
        working-directory: teable-ee
        run: pnpm install --frozen-lockfile

      - name: Download e2e seed snapshot
        uses: actions/download-artifact@v4
        with:
          name: teable-ee-e2e-seed-${{ github.run_id }}-${{ github.run_attempt }}
          path: seed-snapshot

      - name: Install perf cases
        run: |
          set -euo pipefail

          rm -rf teable-ee/community/apps/nestjs-backend/test/perf-lab
          mkdir -p teable-ee/community/apps/nestjs-backend/test/perf-lab
          cp -R \
            perf-lab/cases \
            perf-lab/framework \
            perf-lab/perf-lab.e2e-spec.ts \
            perf-lab/registry.ts \
            teable-ee/community/apps/nestjs-backend/test/perf-lab/

      - name: Start e2e services
        working-directory: teable-ee
        run: |
          set -euo pipefail

          export DOCKER_UID="$(id -u)"
          export DOCKER_GID="$(getent group docker | cut -d: -f3)"

          make docker.create.network
          docker rm -fv "$TEST_PG_CONTAINER_NAME" || true
          docker rm -fv teable-cache || true
          docker rm -fv "$TEST_JAEGER_CONTAINER_NAME" || true

          docker run -d \
            --name "$TEST_JAEGER_CONTAINER_NAME" \
            --network "$NETWORK_MODE" \
            -p 16686:16686 \
            -p 4317:4317 \
            -p 4318:4318 \
            jaegertracing/jaeger:2.16.0 \
            --set=receivers.otlp.protocols.http.endpoint=0.0.0.0:4318 \
            --set=receivers.otlp.protocols.grpc.endpoint=0.0.0.0:4317

          docker compose \
            --env-file ./dockers/.env \
            -f ./dockers/networks.yml \
            -f ./dockers/database-postgres.yml \
            -f ./dockers/cache-redis.yml \
            run -p 25432:5432 -d -T --no-deps --rm \
            --name "$TEST_PG_CONTAINER_NAME" teable-postgres

          docker compose \
            --env-file ./dockers/.env \
            -f ./dockers/networks.yml \
            -f ./dockers/cache-redis.yml \
            up --no-recreate -d teable-cache

          chmod +x scripts/wait-for
          scripts/wait-for 127.0.0.1:16686 --timeout=60 -- echo 'jaeger started successfully'
          scripts/wait-for 127.0.0.1:25432 --timeout=60 -- echo 'pg database started successfully'
          scripts/wait-for 127.0.0.1:6379 --timeout=60 -- echo 'redis cache started successfully'
          until docker exec "$TEST_PG_CONTAINER_NAME" pg_isready -U teable -d postgres; do
            sleep 1
          done

      - name: Restore e2e seed snapshot
        working-directory: teable-ee
        run: |
          set -euo pipefail

          docker exec "$TEST_PG_CONTAINER_NAME" dropdb -U teable --if-exists e2e_test_teable || true
          docker exec "$TEST_PG_CONTAINER_NAME" createdb -U teable e2e_test_teable
          docker exec -i "$TEST_PG_CONTAINER_NAME" pg_restore -U teable -d e2e_test_teable --clean --if-exists < "${GITHUB_WORKSPACE}/seed-snapshot/e2e_test_teable.dump"

      - name: Run perf case through teable-ee e2e
        working-directory: teable-ee
        run: |
          set -euo pipefail

          export PERF_LAB_ARTIFACT_DIR="${GITHUB_WORKSPACE}/perf-lab-artifacts"
          export PERF_LAB_RUN_ID="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${{ matrix.artifact_case }}-${{ matrix.engine }}"
          export PERF_LAB_ENGINE="${{ matrix.engine }}"
          export PERF_LAB_CASE_ID="${{ matrix.case_id }}"
          export PERF_LAB_SAMPLES="${{ inputs.samples }}"
          export PERF_LAB_PRIMARY_THRESHOLD_MS="${{ inputs.primary_threshold_ms }}"
          export OTEL_SERVICE_NAME="${{ matrix.otel_service_name }}"

          pnpm -F @teable/backend-ee exec vitest run \
            --config ./vitest-e2e-community.config.ts \
            ../../community/apps/nestjs-backend/test/perf-lab/perf-lab.e2e-spec.ts \
            --silent=false \
            --bail 1

      - name: Upload perf artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: teable-ee-e2e-perf-${{ matrix.artifact_case }}-${{ matrix.engine }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: perf-lab-artifacts
          if-no-files-found: warn

      - name: Report perf result to Teable
        if: always() && env.TEABLE_PERF_LAB_TOKEN != ''
        working-directory: perf-lab
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PERF_LAB_ARTIFACT_DIR: ${{ github.workspace }}/perf-lab-artifacts
          PERF_LAB_CASE_ID: ${{ matrix.case_id }}
          PERF_LAB_ARTIFACT_CASE: ${{ matrix.artifact_case }}
          PERF_LAB_ENGINE: ${{ matrix.engine }}
          PERF_LAB_JOB_RESULT: ${{ job.status }}
          PERF_LAB_TEABLE_EE_REF: ${{ inputs.teable_ee_ref }}
          PERF_LAB_ARTIFACT_NAME: teable-ee-e2e-perf-${{ matrix.artifact_case }}-${{ matrix.engine }}-${{ github.run_id }}-${{ github.run_attempt }}
        run: node scripts/report-teable-result.mjs

      - name: Publish job summary
        if: always()
        run: |
          if [ -f perf-lab-artifacts/summary.md ]; then
            cat perf-lab-artifacts/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No perf summary was generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Cleanup teable-ee e2e services
        if: always()
        working-directory: teable-ee
        run: |
          set +e

          export DOCKER_UID="$(id -u)"
          export DOCKER_GID="$(getent group docker | cut -d: -f3)"

          docker rm -fv "$TEST_PG_CONTAINER_NAME" || true
          docker rm -fv teable-cache || true
          docker rm -fv "$TEST_JAEGER_CONTAINER_NAME" || true
          docker compose \
            --env-file ./dockers/.env \
            -f ./dockers/networks.yml \
            -f ./dockers/database-postgres.yml \
            -f ./dockers/cache-redis.yml \
            down -v || true
          docker network rm "$NETWORK_MODE" || true
